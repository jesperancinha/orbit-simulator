<section class="orbit-simulator">
  <h1>Orbit Simulator</h1>

  @if (planetsResource.isLoading()) {
    <p>Loading planets…</p>
  } @else if (planetsResource.error()) {
    <p role="alert">Could not load planets: {{ planetsResource.error() }}</p>
  } @else {
    <canvas #canvas width="400" height="400"></canvas>

    <div class="controls">
      <button type="button" (click)="toggleRunning()">
        {{ running() ? 'Pause' : 'Resume' }}
      </button>

      <label>
        Speed
        <input
          type="range"
          min="0.1"
          max="5"
          step="0.1"
          [value]="speedFactor()"
          (input)="setSpeedFactor($any($event.target).valueAsNumber)"
        />
        {{ speedFactor() | number: '1.1-1' }}x
      </label>

      <span>{{ planetCount() }} planets</span>
    </div>
  }
</section>
